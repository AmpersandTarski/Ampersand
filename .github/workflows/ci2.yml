# Inspired by https://tech.freckle.com/2021/05/18/haskell-on-actions/
name: Build and test 🚀
on:
  push:
    branches:
      - "**" # Only trigger on branches (i.e. not tags, ..)
    paths:
      # Build kernel: only changes to what the compiler build actually
      # consumes should trigger a (re)build. Update this list only when you
      # change what goes into the build. Everything else (docs, memorybank,
      # ReleaseNotes.md, READMEs, the workflow files themselves) is ignored
      # on purpose, so non-build changes do not spin up the Haskell build.
      - "src/**"
      - "app/**"
      - "AmpersandData/**"      # bundled into the binary (extra-source-files)
      - "outputTemplates/**"    # bundled into the binary (extra-source-files)
      - "testing/**"            # test-suite inputs (discovered at runtime by the test suite)
      - "package.yaml"
      - "ampersand.cabal"
      - "stack.yaml"
      - "stack.yaml.lock"
      - "Setup.hs"
      - "Dockerfile"
      - ".dockerignore"
      - ".hlint.yaml"
      - "weeder.dhall"
      - "hie.yaml"
jobs:
  build-and-test-docker:
    name: Build with Docker
    runs-on: ubuntu-24.04
    env:
      DOCKER_AMPERSAND_IMAGE: ampersandtarski/ampersand
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare for docker
        run: |
          echo Running on branch ${GITHUB_REF##*/}
          docker version

      - name: Build final image
        run: docker build . --tag ${DOCKER_AMPERSAND_IMAGE}:latest --build-arg GIT_SHA=${{ github.sha }} --build-arg GIT_Branch=${{ github.ref }}

      # For main branch push latest to DockerHub
      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Push latest
        if: github.ref == 'refs/heads/main'
        run: docker push ${DOCKER_AMPERSAND_IMAGE}:latest

  build-and-test-ubuntu:
    name: Build and test on ubuntu-24.04 🏗 🧪
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout project contents 📡
        uses: actions/checkout@v5
      - name: Install system libraries 🧰
        run: sudo apt-get update && sudo apt-get install -y libbz2-dev
      - name: Set up Mariadb 🧰
        uses: shogo82148/actions-setup-mysql@v1
        with:
          mysql-version: "mariadb-11.5"
      - name: Build and test 🏗 🧪
        uses: freckle/stack-action@v5 # stack-action does all these steps: dependencies, build, test.
        with:
          stack-build-arguments: "--copy-bins --flag ampersand:buildAll"
          upgrade-stack: false
          cache-save-always: true

  build-and-test-windows:
    name: Build and test on windows-2022 🏗 🧪
    runs-on: windows-2022
    steps:
      - name: Checkout project contents 📡
        uses: actions/checkout@v5
      - name: Use cache (manually) 📦 # See https://github.com/freckle/stack-cache-action/issues/5
        uses: actions/cache@v4
        # TODO: Cache might be done better, see for inspiration:  https://github.com/godu/advent-of-code-2020/blob/46796832f59d185457a8edf8de043a54a451d688/.github/workflows/ci.yml
        with:
          path: |
            ~/.ghc
            ~/.stack
            ~/.stack-work
          key: ${{ runner.os }}-stack
      - name: Set up Mariadb 🧰
        uses: shogo82148/actions-setup-mysql@v1
        with:
          mysql-version: "mariadb-11.5"
      - name: Setup PHP 🧰
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.0"
          extensions: mysqli
      - name: Build and test 🏗 🧪
        uses: freckle/stack-action@v5
        with:
          stack-build-arguments: "--copy-bins --flag ampersand:buildAll"
          upgrade-stack: false
          cache-save-always: true
