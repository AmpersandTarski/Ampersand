<svg width="680" viewBox="0 0 680 392" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Roadmap matrix: audiences against shared topics</title>
<desc>A matrix with five audiences as columns and seven shared topics as rows. Colour intensity shows how central a topic is for an audience. Numbered badges show the suggested order of work, with a foundation phase on top.</desc>
<style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;fill:#21303B}
.ts{font-size:12px;fill:#5F5E5A}
.th{font-size:14px;fill:#21303B;font-weight:500}
</style>
<rect x="0" y="0" width="680" height="392" fill="#FFFFFF"/>
<rect x="40" y="14" width="600" height="32" rx="8" fill="#FAEEDA" stroke="#EF9F27"/>
