# Regression tests for the Stage-1 oscillation-risk analysis
# (Ampersand.FSpec.Oscillation). All scripts must type-check cleanly; the
# analysis only emits warnings, so the exit code stays 0. The point of these
# cases is documented in each .adl and in
# literature_search/Investigative Report: Making Oscillation Risk Visible in Ampersand.md
#   * mono-cycle.adl    a monotone (insert-only) cycle  -> no risk reported
#   * merge-alone.adl   a standalone merge rule         -> no risk reported
#   * insdel-cycle.adl  a genuine insert/delete cycle   -> risk reported
testCmds:
  - command: ampersand check
    exitcode: 0
